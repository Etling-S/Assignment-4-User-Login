<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukulele Library</title>
    <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-con" />
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

<!-- NAVIGATION BAR -->
<nav id="top" class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">Ukulele Library</span>
    <div class="ms-auto">
        <a class="nav-link d-inline text-white" href="#Easy">Easy</a>
        <a class="nav-link d-inline text-white" href="#Medium">Medium</a>
        <a class="nav-link d-inline text-white" href="#Hard">Hard</a>
    </div>
</nav>

<div class="container mt-4">
     <div id="auth-section" class="card p-4 mb-4 shadow-sm">
    <h4>Login</h4>

    <input id="login-username" class="form-control mb-2" placeholder="Username">
    <input id="login-password" type="password" class="form-control mb-2" placeholder="Password">

    <button onclick="login()" class="btn btn-dark w-100 mb-2">Login</button>

    <hr>

    <h5>Sign Up</h5>

    <input id="signup-username" class="form-control mb-2" placeholder="Username">
    <input id="signup-email" class="form-control mb-2" placeholder="Email">
    <input id="signup-password" type="password" class="form-control mb-2" placeholder="Password">

    <button onclick="signup()" class="btn btn-outline-dark w-100">Sign Up</button>
</div>

    <!-- ADD SONG CARD -->
    <div id="add-song-section" class="card p-4 mb-4 shadow-sm">
        <h4 class="mb-3">Add a Song</h4>

        <input id="title" class="form-control mb-2" placeholder="Song Title">
        <input id="artist" class="form-control mb-2" placeholder="Artist">
        <input id="chords" type="number" class="form-control mb-2" placeholder="Number of Chords">
        <input id="link" class="form-control mb-3" placeholder="Song Link">

        <button onclick="createSong()" class="btn btn-dark w-100">
            Add Song
        </button>
        <button onclick="logout()" class="btn btn-danger w-100 mt-2">
    Logout
</button>
    </div>

    <!-- SONG LIST -->
    <div id="songs"></div>

</div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
    crossorigin="anonymous"></script>
    <script src="main.js"></script>
</body>
</html>
